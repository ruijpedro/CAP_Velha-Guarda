name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Unzip Android project
        run: |
          rm -rf build_src
          mkdir build_src
          unzip -q CAP_Velha_Guarda_Android_Project.zip -d build_src
          ls -la build_src
          ls -la build_src/ChulaXuta_Android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: build_src/ChulaXuta_Android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CAP-Velha-Guarda-debug-apk
          path: build_src/ChulaXuta_Android/app/build/outputs/apk/debug/app-debug.apk
